server {
    listen 80;
    server_name techrise.ru www.techrise.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name techrise.ru www.techrise.ru;

    ssl_certificate     /etc/letsencrypt/live/techrise.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/techrise.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # Redirect /page.html → /page (убираем расширение из URL)
    location ~ ^/(.+)\.html$ {
        return 301 /$1;
    }

    location / {
        # Пробуем: точный файл → папка → файл.html → index.html
        try_files $uri $uri/ $uri.html /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}